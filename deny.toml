# cargo-deny configuration (RG-10: dependency & supply-chain discipline).
# Run: cargo deny check   (CI runs this on every PR)

[advisories]
version = 2
yanked = "deny"
# `paste` is a tiny, ubiquitous proc-macro pulled in transitively by the boa
# JavaScript engine (epiphany-flow, ADR-0004). It is flagged unmaintained
# (RUSTSEC-2024-0436) - an informational "no longer maintained" notice, not a
# vulnerability - and the dependency is not under our control. Ignore it
# explicitly; revisit if boa drops it or a real vulnerability is published.
ignore = ["RUSTSEC-2024-0436"]

[licenses]
version = 2
# Our own crates are unpublished (publish = false); don't license-check them.
private = { ignore = true }
# Allowed licenses for third-party dependencies (all permissive; current deps are MIT OR Apache-2.0).
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal workspace crates are referenced by path without a version (= wildcard);
# allow that while still banning wildcard versions on real (crates.io) dependencies.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
